<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статистика - Корпоративная проверка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body {
            background: #f8f9fa;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .stats-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .stat-item {
            text-align: center;
            padding: 20px;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
        }
        .stat-label {
            font-size: 1rem;
            opacity: 0.9;
        }
        .engineer-row {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .engineer-name {
            flex: 0 0 150px;
            font-weight: 600;
        }
        .progress {
            flex: 1;
            height: 10px;
            margin: 0 15px;
        }
        .rating {
            flex: 0 0 80px;
            text-align: right;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>
            <i class="bi bi-graph-up text-primary"></i>
            Статистика проверок
        </h1>
        <a href="/corporate" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Назад к заявкам
        </a>
    </div>

    <div class="row" id="statsContainer">
        <div class="col-md-3">
            <div class="stats-card stat-item">
                <div class="stat-number" id="totalApps">0</div>
                <div class="stat-label">Всего заявок</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stats-card stat-item" style="background: linear-gradient(135deg, #28a745 0%, #20c997 100%);">
                <div class="stat-number" id="stage1Ok">0</div>
                <div class="stat-label">Этап 1 ОК</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stats-card stat-item" style="background: linear-gradient(135deg, #dc3545 0%, #f86c6c 100%);">
                <div class="stat-number" id="stage1Nok">0</div>
                <div class="stat-label">Этап 1 НОК</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stats-card stat-item" style="background: linear-gradient(135deg, #17a2b8 0%, #6cb2eb 100%);">
                <div class="stat-number" id="completed">0</div>
                <div class="stat-label">Завершено</div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="stats-card">
                <h5><i class="bi bi-bar-chart"></i> Статистика по этапам</h5>
                <canvas id="stagesChart" height="200"></canvas>
            </div>
        </div>
        <div class="col-md-6">
            <div class="stats-card">
                <h5><i class="bi bi-calendar"></i> Заявки по дням</h5>
                <canvas id="dailyChart" height="200"></canvas>
            </div>
        </div>
    </div>

    <div class="stats-card">
        <h5><i class="bi bi-trophy"></i> Рейтинг инженеров</h5>
        <div id="engineersStats">
            <div class="text-center p-4">
                <div class="spinner-border text-primary"></div>
                <p class="mt-2">Загрузка статистики...</p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    async function loadStatistics() {
        try {
            const response = await fetch('/api/corp/applications/stats');
            const stats = await response.json();

            document.getElementById('totalApps').textContent = stats.totalApplications || 0;
            document.getElementById('stage1Ok').textContent = stats.stage1Ok || 0;
            document.getElementById('stage1Nok').textContent = stats.stage1Nok || 0;
            document.getElementById('completed').textContent = stats.completedApplications || 0;

            renderStagesChart(stats);
            renderDailyChart(stats.byDay || {});
            renderEngineersStats(stats.engineerStats || []);

        } catch (error) {
            console.error('Ошибка загрузки статистики:', error);
            document.getElementById('statsContainer').innerHTML =
                '<div class="alert alert-danger">Ошибка загрузки статистики</div>';
        }
    }

    function renderStagesChart(stats) {
        const ctx = document.getElementById('stagesChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Этап 1', 'Этап 2'],
                datasets: [
                    {
                        label: 'OK',
                        data: [stats.stage1Ok || 0, stats.stage2Ok || 0],
                        backgroundColor: '#28a745'
                    },
                    {
                        label: 'НОК',
                        data: [stats.stage1Nok || 0, stats.stage2Nok || 0],
                        backgroundColor: '#dc3545'
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: { stepSize: 1 }
                    }
                }
            }
        });
    }

    function renderDailyChart(byDay) {
        const ctx = document.getElementById('dailyChart').getContext('2d');
        const dates = Object.keys(byDay).slice(0, 14).reverse();
        const counts = dates.map(d => byDay[d]);

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: dates.map(d => new Date(d).toLocaleDateString('ru-RU', {day: 'numeric', month: 'short'})),
                datasets: [{
                    label: 'Заявок в день',
                    data: counts,
                    borderColor: '#667eea',
                    backgroundColor: 'rgba(102, 126, 234, 0.1)',
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: { stepSize: 1 }
                    }
                }
            }
        });
    }

    function renderEngineersStats(engineers) {
        const container = document.getElementById('engineersStats');

        if (!engineers || engineers.length === 0) {
            container.innerHTML = '<p class="text-muted text-center">Нет данных</p>';
            return;
        }

        let html = '';
        engineers.sort((a, b) => b.successRate - a.successRate);

        engineers.forEach((eng, index) => {
            const medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : '📊';
            html += `
                <div class="engineer-row">
                    <span class="engineer-name">${medal} ${eng.name || 'Не указан'}</span>
                    <div class="progress">
                        <div class="progress-bar ${eng.successRate > 80 ? 'bg-success' : eng.successRate > 50 ? 'bg-warning' : 'bg-danger'}"
                             style="width: ${eng.successRate}%"></div>
                    </div>
                    <span class="rating">${eng.successRate.toFixed(1)}%</span>
                </div>
            `;
        });

        container.innerHTML = html;
    }

    document.addEventListener('DOMContentLoaded', loadStatistics);
</script>
</body>
</html>
