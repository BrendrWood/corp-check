<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корпоративная проверка - Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #ffffff 0%, #e7e7e7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo i {
            font-size: 60px;
            color: #667eea;
        }
        .logo h1 {
            font-size: 24px;
            margin-top: 10px;
            color: #333;
        }
        .alert {
            margin-bottom: 20px;
            border-radius: 10px;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-login {
            background: linear-gradient(135deg, ##f7f7f7 0%, #c9c9c9 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            color: #000000;
            width: 100%;
            transition: transform 0.2s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(138, 123, 138, 0.4);
        }
        .remember-me {
            display: flex;
            align-items: center;
            margin: 15px 0;
        }
        .remember-me input {
            margin-right: 8px;
            cursor: pointer;
        }
        .remember-me label {
            color: #666;
            cursor: pointer;
        }
        .users-list {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }
        .users-list h3 {
            font-size: 16px;
            color: #666;
            margin-bottom: 15px;
        }
        .user-badge {
            display: inline-block;
            background: #f0f0f0;
            padding: 5px 10px;
            border-radius: 20px;
            margin: 0 5px 5px 0;
            font-size: 12px;
            color: #333;
        }
        .user-badge i {
            margin-right: 3px;
            color: #667eea;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo">
        <i class="bi bi-building"></i>
        <h1>Корпоративная проверка</h1>
        <p class="text-muted">Система двухэтапного контроля качества</p>
    </div>

    <!-- Сообщения -->
    <div th:if="${param.logout}" class="alert alert-success">
        <i class="bi bi-check-circle"></i> Вы успешно вышли из системы
    </div>
    <div th:if="${param.error}" class="alert alert-danger">
        <i class="bi bi-exclamation-triangle"></i> Ошибка входа. Проверьте логин и пароль.
    </div>

    <!-- Форма входа -->
    <form th:action="@{/login}" method="POST">
        <div class="mb-3">
            <label for="username" class="form-label">Логин</label>
            <input type="text" class="form-control" id="username" name="username"
                   placeholder="Введите логин" required autofocus>
        </div>

        <div class="mb-3">
            <label for="password" class="form-label">Пароль</label>
            <input type="password" class="form-control" id="password" name="password"
                   placeholder="Введите пароль" required>
        </div>

        <div class="remember-me">
            <input type="checkbox" id="remember-me" name="remember-me" value="true">
            <label for="remember-me">
                <i class="bi bi-check2-square"></i> Запомнить меня
            </label>
        </div>

        <button type="submit" class="btn btn-login">
            <i class="bi bi-box-arrow-in-right"></i> Войти в систему
        </button>
    </form>

</div>
</body>
</html>
